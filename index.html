<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uisneach</title>
  <style>
    :root {
        --gold: #DFB200
    }
    
    a {
        color: white;
        text-decoration: none;
    }
    
    body {
        background-color: #313B4C;
        margin: 0;
        padding: 0;
        color: white;
    }

    .poem-title {
        text-align: center;
        cursor: pointer;
        margin-bottom: 35px;
    }
    
    .title {
        text-align: center;
    }
    
    .columns {
        float: left;
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
    }
    
    .column {
        float: left;
        width: 25%;
        padding: 10px;
        border: 2px solid white;
        box-sizing: border-box;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    
    .column-title {
        text-align: center;
    }

    .link-to-page {
        cursor: pointer;
    }
</style>
</head>
<body>
<h1 class="title">Index</h1>
  <center>
      <img src="https://i.pinimg.com/originals/63/07/0e/63070e11e2246b64b2cc552a997b4fcd.png" style='height: 10%; width: 10%; object-fit: contain'/>
  </center>
  <div class="columns">
    <div class="column">
        <h2 class="column-title">Filiocht</h2>
        <div id="filiocht-list">
        </div>
    </div>
    <div class="column">
        <h2 class="column-title">Aisteacht</h2>
            <p>Some text..</p>
    </div>
    <div class="column">
        <h2 class="column-title">Stair</h2>
            <p>Some text..</p>
    </div>
    <div class="column">
        <h2 class="column-title">Finscéalaíocht</h2>
            <p>Some text..</p>
    </div>
  </div>
  <script>

    function go(poemName) {
        window.location.href = "filiocht-datheangach.html?poem=" + encodeURIComponent(poemName);
    }

    function initMediaLists()
    {
        initFiliocht();
    }

    function initFiliocht()
    {
        //To init, we must fetch the titles of all poems and add them to "filiocht-list" in HTML
        let list = document.getElementById("filiocht-list");
        var query = "bilingual-poems";
        let titles = [];
        let titleLinks = [];
        fetch('https://raw.githubusercontent.com/uisneach/uisneach.github.io/main/data.json')
            .then(res => res.json())
            .then(json => {
                for (let key in json) {
                    var poemType = json[key];
                    if ((key == "bilingual-poems" || key == "monolinual-poems") && typeof poemType === 'object' && poemType !== null)
                        for (key2 in poemType) {
                            var poem = poemType[key2];
                                console.log(poem);
                            if (typeof poem === 'object' && poem !== null) {
                                titles.push(poem["irish-title"]);
                                titleLinks.push(key2);
                            }
                        }
                }
                for (let i = 0; i < titles.length; i++)
                {
                    // Create a new <li> element
                     let listItem = document.createElement("p");

                    // Set the text of the <li> element
                     listItem.textContent = titles[i];
                     listItem.className = "poem-title";
                     listItem.onclick = function() {go(titleLinks[i])};

                    // Append the <li> element to the <ol> element
                    list.appendChild(listItem);
                }
            });
    }

    function trimQuotes(string)
    {return string.substring(1).substring(0, string.length - 2).replaceAll("\\", "");}

    window.onload = initMediaLists();
  </script>
</body>
</html>
